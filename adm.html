<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>真珠 · 手機後台</title>
<link rel="icon" href="https://www.jinzhu.com.tw/favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --pine:#004d40;--pine-dark:#002e27;--pine-light:#00695c;
  --gold:#b89150;--gold-light:#d4a85a;
  --ink:#1e293b;--stone:#64748b;--border:#e2e8f0;--paper:#f8fafc;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:62px;
}
/* TG Mini App 原生化 */
html{
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
}
/* 所有互動元素加 active 縮放效果 */
.order-header:active,.seg-btn:active,.nav-item:active,.btn:active,.menu-item-card:active{
  transform:scale(.97);
  transition:transform .1s;
}
/* 滾動更順滑 */
#content,#eos-panels .eos-panel,#cal-day-body{
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
/* 去掉 input/select 原生樣式 */
input,select,textarea{
  -webkit-appearance:none;
  appearance:none;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOP BAR */
#top-bar{flex-shrink:0;background:var(--pine-dark);padding:10px 16px;padding-top:calc(10px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.3);z-index:10}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{height:26px;filter:brightness(0) invert(1);opacity:.9}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.15)}
.tb-title{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.08em}
.kpi-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:5px 12px}
.kpi-num{font-family:'Noto Serif TC',serif;font-weight:900;color:var(--gold);font-size:15px;line-height:1}
.kpi-lbl{font-size:10px;color:rgba(255,255,255,.4);font-weight:700}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 8px)}

/* BOTTOM NAV */
#bottom-nav{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));background:var(--pine-dark);display:flex;align-items:flex-start;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;color:rgba(255,255,255,.35);font-size:9px;font-weight:700;cursor:pointer;transition:color .2s;border:none;background:none;letter-spacing:.05em}
.nav-icon{font-size:20px;line-height:1}
.nav-item.active{color:var(--gold)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px rgba(184,145,80,.5))}

/* SECTIONS */
.section{display:none;padding:12px 14px}
.section.active{display:block}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:900;color:var(--pine);display:flex;align-items:center;gap:8px}
.sec-head h2::before{content:'';display:block;width:3px;height:18px;background:var(--gold);border-radius:2px}

/* SEGMENT */
.seg-wrap{margin-bottom:12px}
.seg-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);margin-bottom:5px;padding-left:1px}
.seg-row{display:flex;background:#e2e8f0;border-radius:10px;padding:3px;gap:2px}
.seg-btn{flex:1;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:700;border:none;background:transparent;color:#94a3b8;cursor:pointer;transition:all .18s;white-space:nowrap;text-align:center;font-family:'Noto Sans TC',sans-serif}
.seg-btn.on{background:white;color:var(--pine);box-shadow:0 1px 6px rgba(0,0,0,.12)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;padding:10px 40px 10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;background:white;outline:none;font-family:'Noto Sans TC',sans-serif;color:var(--ink);transition:border .2s}
.search-wrap input:focus{border-color:var(--pine)}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--stone);font-size:16px;pointer-events:none}

/* ORDER CARD */
.order-card{background:white;border-radius:16px;border:1px solid var(--border);border-left:3px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden;margin-bottom:10px}
.order-card.status-pending{border-left-color:var(--gold)}
.order-card.status-synced{border-left-color:#10b981;opacity:.72}
.order-header{padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;-webkit-user-select:none;user-select:none;transition:background .15s}
.order-header:active{background:#f8fafc}
.order-card.open>.order-header{border-bottom:1px solid var(--border)}
.order-name{font-weight:900;font-size:15px}
.order-meta{font-size:11px;color:var(--stone);margin-top:2px}
.order-amt{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:900;color:var(--gold);white-space:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.pending{background:var(--gold);box-shadow:0 0 5px rgba(184,145,80,.5)}
.status-dot.synced{background:#10b981}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-top:3px}
.badge.pending{background:#fef3c7;color:#d97706}
.badge.synced{background:#d1fae5;color:#059669}

/* ORDER BODY */
.order-body{display:none;padding:14px}
.order-card.open>.order-body{display:block}
.order-sec{margin-bottom:16px}
.order-sec-lbl{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.order-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* FIELDS */
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.f-row.three{grid-template-columns:1fr 1fr 1fr}
.f-group{margin-bottom:10px}
.f-label{display:block;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);margin-bottom:5px}
.f-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:#f8fafc;outline:none;transition:border .2s;color:var(--ink);font-family:'Noto Sans TC',sans-serif;-webkit-appearance:none}
.f-input:focus{border-color:var(--pine);background:white}
textarea.f-input{resize:none;line-height:1.6}

/* ITEMS DISPLAY */
.items-box{background:#f8fafc;border-radius:10px;padding:4px 8px;margin-bottom:8px}
.set-blk{border:1.5px solid rgba(184,145,80,.3);border-radius:10px;overflow:hidden;margin-bottom:6px}
.set-blk-head{background:rgba(184,145,80,.08);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(184,145,80,.15)}
.set-blk-head .sn{font-weight:900;font-size:12px;color:var(--gold)}
.set-blk-head .sq{font-weight:900;font-size:12px;color:var(--pine)}
.set-blk-body{padding:4px 12px}
.single-blk{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px}
.single-blk-head{background:#f8fafc;padding:5px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--stone);letter-spacing:.1em;text-transform:uppercase}
.single-blk-body{padding:4px 12px}
.item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px}
.item-row:last-child{border-bottom:none}
.item-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0}
.item-name{flex:1;font-weight:700}
.item-flv{font-size:10px;color:var(--gold);margin-left:3px}
.item-qty{font-weight:900;color:var(--pine);font-size:14px}
.item-unit{font-size:10px;color:var(--stone)}
.note-blk{background:#f0fdf4;border-left:3px solid var(--pine);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--pine);margin-top:4px}

/* ACTIONS */
.order-actions{display:grid;grid-template-columns:44px 1fr 44px;gap:8px;margin-top:14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;-webkit-appearance:none}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:var(--pine);color:white}
.btn-gold{background:var(--gold);color:white}
.btn-ghost{background:white;color:var(--stone);border:1.5px solid var(--border)}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-icon{padding:9px;border-radius:9px;font-size:16px}
.btn-full{width:100%}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{background:none;border:none;font-size:22px;color:var(--pine);cursor:pointer;padding:4px 10px;border-radius:8px}
.cal-nav button:active{background:#e2e8f0}
.cal-month{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:900;color:var(--pine)}
.cal-wrap{border:1px solid var(--border);border-radius:14px;overflow:hidden}
.cal-heads{display:grid;grid-template-columns:repeat(7,1fr);background:#f1f5f9}
.cal-head{text-align:center;font-size:10px;font-weight:700;padding:6px 0;color:var(--stone)}
.cal-head.sun{color:#ef4444}.cal-head.sat{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border)}
.cal-cell{min-height:56px;padding:4px;cursor:pointer;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s;background:white}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:active{background:#f0fdf4}
.cal-cell.today{background:#f0fdf4}
.cal-cell.empty{background:#fafafa;cursor:default}
.cal-cell .dn{font-size:12px;font-weight:900;color:#334155;line-height:1;margin-bottom:2px}
.cal-cell.today .dn{background:var(--pine);color:white;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px}
.cal-cell .dn.sun{color:#ef4444}.cal-cell .dn.sat{color:#3b82f6}
.cal-cnt{font-size:9px;font-weight:900;background:var(--pine);color:white;border-radius:4px;padding:0 4px;margin-bottom:2px;display:inline-block}
.cal-dots{display:flex;flex-direction:column;gap:1px}
.cal-dot-item{font-size:8px;font-weight:700;color:var(--pine);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:rgba(0,77,64,.06);border-radius:3px;padding:1px 3px}
.no-date-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 12px;margin-top:10px}
.no-date-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.no-date-chip{background:white;border:1px solid #fde68a;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#92400e}

/* TOAST */
#toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100vw - 32px);max-width:360px}
.toast{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:700;color:white;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn .3s ease both;display:flex;align-items:center;gap:8px}
.toast.success{background:var(--pine)}.toast.error{background:#dc2626}.toast.warn{background:#d97706}.toast.info{background:#1e40af}
.toast.out{animation:toastOut .25s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* CONFIRM */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;display:none;align-items:flex-end;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
#confirm-overlay.visible{display:flex}
#confirm-box{background:white;border-radius:20px;padding:24px 20px;width:100%;max-width:420px;padding-bottom:calc(24px + var(--safe-bot));animation:shUp .25s ease both}
@keyframes shUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
#confirm-icon{font-size:1.8rem;margin-bottom:10px}
#confirm-title{font-size:15px;font-weight:900;margin-bottom:6px}
#confirm-msg{font-size:13px;color:var(--stone);line-height:1.7;margin-bottom:20px}
.confirm-acts{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:white;color:var(--stone);font-weight:700;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.confirm-ok{flex:1.5;padding:13px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.confirm-ok.danger{background:#dc2626;color:white}.confirm-ok.primary{background:var(--pine);color:white}

/* SHEET */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.sheet-ov.visible{display:flex}
.sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bot));animation:shUp .3s ease both}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:900;color:var(--pine);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* EDIT ORDER SHEET — 全螢幕 */
#edit-order-sheet{position:fixed;inset:0;background:white;z-index:600;display:none;flex-direction:column}
#edit-order-sheet.visible{display:flex}
#eos-header{flex-shrink:0;background:var(--pine-dark);padding:12px 16px;padding-top:calc(12px + var(--safe-top));display:flex;align-items:center;gap:12px}
#eos-back{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:4px 8px;flex-shrink:0}
#eos-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:900;color:white;flex:1}
#eos-total{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:900;color:var(--gold);flex-shrink:0}
#eos-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* Tab bar inside edit sheet */
#eos-tabs{flex-shrink:0;display:flex;background:#f1f5f9;border-bottom:1px solid var(--border)}
.eos-tab{flex:1;padding:11px 4px;font-size:12px;font-weight:700;border:none;background:transparent;color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-family:'Noto Sans TC',sans-serif}
.eos-tab.on{color:var(--pine);background:white;border-bottom-color:var(--gold)}
#eos-panels{flex:1;overflow:hidden;position:relative}
.eos-panel{position:absolute;inset:0;overflow-y:auto;padding:12px 14px;display:none}
.eos-panel.on{display:block}

/* 菜單 grid (within edit sheet) */
.menu-cat-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none}
.menu-cat-scroll::-webkit-scrollbar{display:none}
.menu-cat-pill{flex-shrink:0;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:white;color:var(--stone);cursor:pointer;transition:all .15s}
.menu-cat-pill.on{background:var(--pine);color:white;border-color:var(--pine)}
.menu-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-item-card{background:white;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column}
.menu-item-card:active{transform:scale(.97)}
.menu-item-card .mi-img{height:80px;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}
.menu-item-card .mi-img img{max-height:100%;max-width:100%;object-fit:contain}
.menu-item-card .mi-body{padding:8px 10px}
.menu-item-card .mi-name{font-weight:700;font-size:12px;line-height:1.3;color:var(--ink)}
.menu-item-card .mi-price{font-weight:900;font-size:12px;color:var(--gold);margin-top:3px}
.menu-item-card .mi-set{font-size:10px;font-weight:700;color:var(--pine)}

/* Cart list */
.cart-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;margin-bottom:6px}
.cart-item-name{flex:1;font-size:13px;font-weight:700;color:var(--ink);line-height:1.4;cursor:pointer;text-decoration:underline;text-decoration-color:var(--gold)}
.cart-item-price{font-weight:900;color:var(--gold);font-size:13px;flex-shrink:0}
.cart-item-del{background:none;border:none;color:#ef4444;font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}

/* Qty control */
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:6px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--pine)}
.qty-val{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:900;color:var(--pine);min-width:24px;text-align:center}

/* Flavor / set popup inside edit sheet */
#pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:700;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
#pop-overlay.visible{display:flex}
#pop-box{background:white;border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bot));animation:shUp .3s ease both}
.pop-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px}
#pop-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:900;color:var(--pine);margin-bottom:16px}
.pop-sec-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);margin-bottom:8px}
.flv-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.flv-chip{padding:8px 16px;border:1.5px solid var(--border);border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;background:#f8fafc;color:var(--ink);transition:all .15s}
.flv-chip.on{background:var(--pine);color:white;border-color:var(--pine)}
.set-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.set-opt{padding:12px 8px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;background:#f8fafc;text-align:center;color:var(--ink);transition:all .15s}
.set-opt.on{background:var(--pine);color:white;border-color:var(--pine)}

/* SAVE BAR */
#eos-save-bar{flex-shrink:0;padding:12px 14px;padding-bottom:calc(12px + var(--safe-bot));background:white;border-top:1px solid var(--border);display:flex;gap:10px}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,var(--pine-dark) 0%,var(--pine) 60%,var(--pine-light) 100%);display:flex;align-items:center;justify-content:center;padding:24px}
#login-screen.hidden{display:none}
.login-box{width:100%;max-width:360px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo img{height:52px;filter:brightness(0) invert(1)}
.login-logo p{font-family:'Noto Serif TC',serif;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.3em;margin-top:10px;text-transform:uppercase}
.login-field{margin-bottom:16px}

<script>
const _s=supabase.createClient('https://pydlnqriztpzgxbjuohm.supabase.co','sb_publishable_ISKUWOXUR9A-1y81xCOUXg_8-zNle3v');
let allMenuItems=[],allCats=[],allCampaigns=[],ordersRef=[];

// ── PARSE ──
function parseItem(raw){
  // qty：支援「品名(備註) x數字」和「品名 x數字」兩種格式
  let qty=1;
  const qM1_=raw.match(/^[^(]* x(\d+)\s*\(/);
  const qM2_=raw.match(/\) x(\d+)$/);
  const qM3_=raw.match(/^[^(]* x(\d+)$/);
  if(qM1_) qty=parseInt(qM1_[1]);
  else if(qM2_) qty=parseInt(qM2_[1]);
  else if(qM3_) qty=parseInt(qM3_[1]);
  const top=raw.replace(/^([^(]+?) x\d+(\s*\()/,'$1$2').replace(/^([^(]+?) x\d+$/,'$1');
  const pI=top.indexOf(' (');const inner=pI>-1?top.slice(pI+2,-1):null;
  const isSet=!!(inner&&inner.includes('、'));
  const nm=pI>-1?top.slice(0,pI):top;
  const fM=nm.match(/\[([^\]]+)\]/);const flv=fM?fM[1]:'';
  const clean=raw.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
  return{qty,flv,clean,inner,isSet,brand:isSet?clean.replace(/ \(.*$/,'').trim():null};
}
function parseSubs(innerRaw){
  if(!innerRaw)return[];const map={};
  innerRaw.split('、').forEach(r=>{const{clean,flv,qty}=parseItem(r.trim());if(!clean)return;const k=flv?clean+'｜'+flv:clean;if(!map[k])map[k]={name:clean,flv,qty:0};map[k].qty+=qty||1;});
  return Object.values(map);
}
function twDate(iso){return new Date(new Date(iso).getTime()+8*3600000);}

// ── TOAST ──
function toast(msg,type='success',dur=2500){
  const icons={success:'✅',error:'❌',warn:'⚠️',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.innerHTML=`<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},dur);
}

// ── CONFIRM ──
function confirm2(o){return new Promise(r=>{
  document.getElementById('confirm-icon').textContent=o.icon||'⚠️';
  document.getElementById('confirm-title').textContent=o.title||'確認';
  document.getElementById('confirm-msg').textContent=o.msg||'';
  const ok=document.getElementById('confirm-ok-btn');
  ok.textContent=o.okText||'確認';ok.className=`confirm-ok ${o.danger?'danger':'primary'}`;
  document.getElementById('confirm-overlay').classList.add('visible');
  ok.onclick=()=>{document.getElementById('confirm-overlay').classList.remove('visible');r(true);};
  document.getElementById('confirm-cancel-btn').onclick=()=>{document.getElementById('confirm-overlay').classList.remove('visible');r(false);};
});}

// ── LOGIN ──
async function doLogin(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  document.getElementById('login-error').style.display='none';
  const{error}=await _s.auth.signInWithPassword({email:e,password:p});
  if(error){document.getElementById('login-error').style.display='block';return;}
  document.getElementById('login-screen').classList.add('hidden');initApp();
}
['le','lp'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));

// ── INIT ──
async function initApp(){
  const[{data:cats},{data:camps}]=await Promise.all([
    _s.from('categories').select('*').order('sort_order'),
    _s.from('campaign_settings').select('*')
  ]);
  allCats=cats||[];allCampaigns=camps||[];
  // Fill campaign select in edit sheet
  const cs=document.getElementById('eos-campaign');
  allCampaigns.forEach(c=>{const o=document.createElement('option');o.value=c.code_name;o.textContent=c.code_name;cs.appendChild(o);});
  // Fill time options
  const ts=document.getElementById('eos-time');
  [11,12,13,14,15,17,18,19,20,21].forEach(h=>[0,15,30,45].forEach(m=>{const v=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;const o=document.createElement('option');o.value=v;o.textContent=v;ts.appendChild(o);}));
  loadOrders();updateKpi();
  _s.channel('orders-rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'orders'},p=>{
    toast(`🔔 新訂單：${p.new.customer_name} $${p.new.total_price}`,'info',5000);
    updateKpi();loadOrders();
  }).subscribe();

  // ── Telegram Mini App 初始化 ──
  initTelegram();
}

function initTelegram(){
  if(!window.Telegram?.WebApp) return;
  const tg = window.Telegram.WebApp;

  // ── 基礎設定 ──
  tg.ready();
  tg.expand();
  tg.disableVerticalSwipes();        // 防止下拉關閉 Mini App
  // tg.enableClosingConfirmation() 已停用，按關閉直接離開

  // ── Header 顏色配合品牌色 ──
  try {
    tg.setHeaderColor('#002e27');    // pine-dark
    tg.setBackgroundColor('#f8fafc');
  } catch(e) {}

  // ── 主題色同步 ──
  if(tg.colorScheme === 'dark'){
    document.documentElement.style.setProperty('--paper','#17212b');
    document.documentElement.style.setProperty('--border','#2b5278');
    document.documentElement.style.setProperty('--pine-dark','#17212b');
  }

  // ── 返回按鈕 ──
  tg.BackButton.onClick(()=>{
    if(document.getElementById('edit-order-sheet').classList.contains('visible')){
      closeEditOrder();
    } else if(document.getElementById('pop-overlay').classList.contains('visible')){
      closePop();
    }
  });

  // ── 觸覺回饋封裝 ──
  window.tgHaptic = {
    light:   ()=>{ try{ tg.HapticFeedback.impactOccurred('light'); }catch(e){} },
    medium:  ()=>{ try{ tg.HapticFeedback.impactOccurred('medium'); }catch(e){} },
    heavy:   ()=>{ try{ tg.HapticFeedback.impactOccurred('heavy'); }catch(e){} },
    success: ()=>{ try{ tg.HapticFeedback.notificationOccurred('success'); }catch(e){} },
    error:   ()=>{ try{ tg.HapticFeedback.notificationOccurred('error'); }catch(e){} },
    warning: ()=>{ try{ tg.HapticFeedback.notificationOccurred('warning'); }catch(e){} },
    select:  ()=>{ try{ tg.HapticFeedback.selectionChanged(); }catch(e){} },
  };

  // ── MainButton：在編輯訂單時顯示「💾 儲存」按鈕 ──
  try {
    tg.MainButton.setText('💾 儲存訂單');
    tg.MainButton.color = '#004d40';
    tg.MainButton.textColor = '#ffffff';
    tg.MainButton.onClick(()=>{ saveEditOrder(); });
  } catch(e) {}

  // ── Secondary Button（返回）─
  try {
    tg.SecondaryButton.setText('取消');
    tg.SecondaryButton.onClick(()=>{ closeEditOrder(); });
  } catch(e) {}

  // ── 隱藏底部 save bar（用 TG MainButton 取代）──
  const saveBar = document.getElementById('eos-save-bar');
  if(saveBar) saveBar.style.display='none';

  // ── 從 URL 參數自動跳到指定訂單 ──
  // 儲存 orderId 供 loadOrders 完成後使用
  const params = new URLSearchParams(location.search);
  window._pendingOrderId = params.get('order_id');
}

// 從 TG 連結跳轉到指定訂單（loadOrders 完成後呼叫）
async function jumpToOrderId(orderId){
  if(!orderId) return;
  // 切換到列表模式（確保 DOM 存在）
  setView('list', document.getElementById('v-list'));
  // 先確保訂單在 ordersRef 裡
  if(!ordersRef.find(o=>o.id===orderId)){
    const{data}=await _s.from('orders').select('*').eq('id',orderId).single();
    if(data){ordersRef.push(data);renderOrders(ordersRef);}
  }
  // 等 DOM 渲染完成
  await new Promise(r=>setTimeout(r,200));
  const el=document.getElementById(`oc-${orderId}`);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.add('open');
  }
  // 直接開啟編輯（不等 DOM 捲動）
  await new Promise(r=>setTimeout(r,300));
  openEditOrder(orderId);
}

async function updateKpi(){
  const{count}=await _s.from('orders').select('*',{count:'exact',head:true}).eq('status','pending');
  document.getElementById('kpi-pending').textContent=count??0;
}

function switchTab(tab,el){

// ── LOAD ORDERS ──
async function loadOrders(){
  document.getElementById('order-list').innerHTML='<div class="loading"><div class="spin"></div></div>';
  const q=document.getElementById('q-search').value.trim();
  const twNow=new Date(Date.now()+8*3600000);
  const today=twNow.toISOString().split('T')[0];
  const weekEnd=new Date(Date.now()+7*86400000+8*3600000).toISOString().split('T')[0];
  let qb=_s.from('orders').select('*');
  if(q)qb=qb.or(`customer_name.ilike.%${q}%,phone.ilike.%${q}%`);
  if(fStatus!=='all')qb=qb.eq('status',fStatus);
  if(fDate==='today')qb=qb.gte('booking_date',`${today}T00:00:00+08:00`).lte('booking_date',`${today}T23:59:59+08:00`);
  else if(fDate==='week')qb=qb.gte('booking_date',`${today}T00:00:00+08:00`).lte('booking_date',`${weekEnd}T23:59:59+08:00`);
  const{data,error}=await qb;
  if(error){document.getElementById('order-list').innerHTML='<div class="empty-state"><p>載入失敗</p></div>';return;}
  const orders=(data||[]).sort((a,b)=>{
    if(a.status!==b.status)return a.status==='pending'?-1:1;
    const ad=a.booking_date?new Date(a.booking_date).getTime():Infinity;
    const bd=b.booking_date?new Date(b.booking_date).getTime():Infinity;
    if(ad!==bd)return ad-bd;
    return new Date(b.created_at)-new Date(a.created_at);
  });
  ordersRef=orders;renderOrders(orders);
  // 如果有待跳轉的訂單（從 TG 連結進入）
  if(window._pendingOrderId){
    const tid=window._pendingOrderId;
    window._pendingOrderId=null;
    jumpToOrderId(tid);
  }
}

function renderOrders(orders){
  const el=document.getElementById('order-list');
  if(!orders.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p style="font-size:13px;font-weight:700">找不到訂單</p></div>';return;}
  el.innerHTML=orders.map(o=>orderHtml(o)).join('');
}

function orderHtml(o){
  const synced=o.status==='synced';
  let bStr='';
  if(o.booking_date){const tw=twDate(o.booking_date);bStr=`${String(tw.getUTCMonth()+1).padStart(2,'0')}/${String(tw.getUTCDate()).padStart(2,'0')} ${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`;}
  // parse items for display
  const sets=[],singles={};
  (o.order_content||[]).forEach(item=>{
    const{qty,flv,clean,inner,isSet,brand}=parseItem(item.name);
    if(isSet){sets.push({brand,qty,subList:parseSubs(inner)});}
    else{const k=flv?clean+'｜'+flv:clean;if(!singles[k])singles[k]={name:clean,flv,qty:0};singles[k].qty+=qty;}
  });
  let itemsHtml='';
  sets.forEach(s=>{itemsHtml+=`<div class="set-blk"><div class="set-blk-head"><span class="sn">🍱 ${s.brand}</span><span class="sq">${s.qty} 套</span></div><div class="set-blk-body">${s.subList.map(({name,flv:f,qty:sq})=>`<div class="item-row"><div class="item-dot"></div><div class="item-name">${name}${f?`<span class="item-flv">[${f}]</span>`:''}</div><div class="item-qty">${s.qty*sq}</div><span class="item-unit">份</span></div>`).join('')}</div></div>`;});
  const se=Object.values(singles);
  if(se.length)itemsHtml+=`<div class="single-blk"><div class="single-blk-head">單點</div><div class="single-blk-body">${se.map(({name,flv:f,qty})=>`<div class="item-row"><div class="item-dot"></div><div class="item-name">${name}${f?`<span class="item-flv">[${f}]</span>`:''}</div><div class="item-qty">${qty}</div><span class="item-unit">份</span></div>`).join('')}</div></div>`;

  return`<div class="order-card status-${synced?'synced':'pending'}" id="oc-${o.id}">
  <div class="order-header" onclick="toggleOrder('${o.id}')">
    <div class="status-dot ${synced?'synced':'pending'}"></div>
    <div style="flex:1;min-width:0">
      <div class="order-name">${o.customer_name}</div>
      <div class="order-meta">${o.phone||'—'}${bStr?' · 📅 '+bStr:''}${o.table_no?' · 桌 '+o.table_no:''}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="order-amt">$${o.total_price}</div>
      <div class="badge ${synced?'synced':'pending'}">${synced?'✅ 已完成':'⏳ 待處理'}</div>
    </div>
  </div>
  <div class="order-body">
    <!-- 餐點明細 -->
    <div class="order-sec">
      <div class="order-sec-lbl">🍱 餐點明細</div>
      <div class="items-box">${itemsHtml||'<p style="padding:8px;font-size:12px;color:var(--stone)">無餐點資料</p>'}</div>
      ${o.note?`<div class="note-blk">📝 ${o.note}</div>`:''}
    </div>
    <!-- 操作 -->
    <div class="order-actions">
      <button class="btn btn-danger btn-icon" onclick="deleteOrder('${o.id}')">🗑</button>
      <button class="btn btn-gold btn-full" onclick="openEditOrder('${o.id}')">✏️ 編輯訂單</button>
      <button class="btn btn-icon ${synced?'btn-ghost':'btn-primary'}" onclick="toggleStatus('${o.id}','${o.status}')" title="${synced?'標記待處理':'標記完成'}">${synced?'↩':'✓'}</button>
    </div>
  </div>
</div>`;
}

async function toggleStatus(id,cur){

// ── CART ──
function refreshEosCart(){
  const total=eosCart.reduce((s,i)=>s+Number(i.price),0);
  document.getElementById('eos-total').textContent=`$${total}`;
  document.getElementById('cart-count').textContent=`共 ${eosCart.length} 項`;
  const emptyEl=document.getElementById('cart-empty');
  const listEl=document.getElementById('eos-cart-list');
  if(!eosCart.length){listEl.innerHTML='';emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  listEl.innerHTML=eosCart.map((item,idx)=>{
    // 解析qty
    const qM=item.name.match(/ x(\d+)/);const qty=qM?parseInt(qM[1]):1;
    return`<div class="cart-item">
      <div style="flex:1;min-width:0">
        <div class="cart-item-name" onclick="openPop(null,${idx})">${item.name}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="cartQty(${idx},-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="cartQty(${idx},+1)">＋</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="cart-item-price">$${item.price}</span>
        <button class="cart-item-del" onclick="cartDel(${idx})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function cartDel(idx){eosCart.splice(idx,1);refreshEosCart();}
function cartQty(idx,delta){
  const item=eosCart[idx];if(!item)return;
  const qM=item.name.match(/ x(\d+)/);const qty=qM?parseInt(qM[1]):1;
  const newQty=Math.max(1,qty+delta);
  // 取得基礎單價
  const baseItem=allMenuItems.find(i=>i.name===item.name.split(' [')[0].split(' (')[0].replace(/ x\d+/g,'').trim());
  const unitPrice=baseItem?Number(baseItem.price):Math.round(Number(item.price)/qty);
  if(qM)item.name=item.name.replace(/ x\d+/,newQty>1?` x${newQty}`:'');
  else if(newQty>1)item.name=item.name+` x${newQty}`;
  item.price=unitPrice*newQty;
  refreshEosCart();
}

// ── FLAVOR / SET POPUP ──
let popItem=null,popSels={flavors:{},groups:{}},popEditIdx=-1;

function openPop(itemId,editIdx=-1){
  popEditIdx=editIdx;popSels={flavors:{},groups:{}};
  let prevNames=[],prevFlvs=[];
  if(editIdx>-1){
    const raw=eosCart[editIdx].name;
    const base=raw.split(' [')[0].split(' (')[0].replace(/ x\d+/g,'').trim();
    popItem=allMenuItems.find(i=>i.name===base);
    const pStart=raw.lastIndexOf(' (');
    if(pStart>-1){const inner=raw.slice(pStart+2,-1);prevNames=inner.split('、').map(n=>n.split(' [')[0].replace(/ x\d+/g,'').trim());}
    const fM=raw.match(/\[(.*?)\]/);if(fM)prevFlvs=fM[1].split('/');
  }else{popItem=allMenuItems.find(i=>i.id===itemId);}
  if(!popItem)return;
  const container=document.getElementById('pop-content');container.innerHTML='';
  document.getElementById('pop-title').textContent=popItem.name;
  // Flavors
  if(popItem.item_flavor_relation?.length>0){
    container.innerHTML+=popItem.item_flavor_relation.map(r=>`
      <div style="margin-bottom:16px">
        <div class="pop-sec-label">${r.flavor_groups.name}</div>
        <div class="flv-chips">${r.flavor_groups.flavor_options.map(o=>{
          const isM=prevFlvs.includes(o.option_name);
          if(isM)popSels.flavors[r.flavor_groups.id]=o.option_name;
          return`<div class="flv-chip ${isM?'on':''}" onclick="setFlv(this,'${r.flavor_groups.id}','${o.option_name}')">${o.option_name}</div>`;
        }).join('')}</div>
      </div>`).join('');
  }
  // Set menu
  if(popItem.is_set_menu&&popItem.set_menu_groups){
    const sortedGroups=[...popItem.set_menu_groups].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
    container.innerHTML+=sortedGroups.map(g=>{
      popSels.groups[g.id]=[];
      const sortedContents=[...g.set_menu_contents].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
      const limit=g.selection_limit;
      const groupItemNames=new Set(sortedContents.map(c=>c.menu_items.name));
      const groupPrev=[];let scan=0;
      while(scan<prevNames.length&&groupPrev.length<limit){
        if(groupItemNames.has(prevNames[scan])){groupPrev.push(prevNames[scan]);prevNames.splice(scan,1);}else scan++;
      }
      return`<div style="margin-bottom:16px">
        <div class="pop-sec-label">${g.group_name} <span style="color:var(--gold)">任選${limit}</span></div>
        <div class="set-opts">${sortedContents.map(c=>{
          const idx=groupPrev.indexOf(c.menu_items.name);const isM=idx>-1;
          if(isM){groupPrev.splice(idx,1);popSels.groups[g.id].push({name:c.menu_items.name});}
          const pa_=c.price_adjustment||0;
            const paTag=pa_>0?` +$${pa_}`:pa_<0?` -$${Math.abs(pa_)}`:'';
            return`<div class="set-opt ${isM?'on':''}" onclick="setGrp(this,'${g.id}','${c.menu_items.name}',${limit},${pa_})" style="position:relative">${c.menu_items.name}${paTag?`<span style="font-size:9px;color:var(--gold);display:block;margin-top:2px">${paTag}</span>`:''}</div>`;
        }).join('')}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('pop-overlay').classList.add('visible');
}

function closePop(){document.getElementById('pop-overlay').classList.remove('visible');}
function setFlv(el,gid,name){
  el.closest('.flv-chips').querySelectorAll('.flv-chip').forEach(c=>{c.classList.remove('on');});
  el.classList.add('on');popSels.flavors[gid]=name;
}
function setGrp(el,gid,name,limit,priceAdj=0){
  let s=popSels.groups[gid];
  if(limit===1){
    el.closest('.set-opts').querySelectorAll('.set-opt').forEach(c=>c.classList.remove('on'));
    el.classList.add('on');popSels.groups[gid]=[{name,priceAdj}];
  }else{
    if(s.some(x=>x.name===name)){popSels.groups[gid]=s.filter(x=>x.name!==name);el.classList.remove('on');}
    else if(s.length<limit){popSels.groups[gid]=[...s,{name,priceAdj}];el.classList.add('on');}
  }
}
function confirmPop(){
  if(!popItem)return;
  const fn=Object.values(popSels.flavors).join('/');
  const gn=Object.values(popSels.groups).flat().map(x=>x.name).join('、');
  let xQty='';
  if(popEditIdx>-1){const qM=eosCart[popEditIdx].name.match(/ x(\d+)/);if(qM)xQty=` x${qM[1]}`;}
  const finalName=`${popItem.name}${xQty}${fn?` [${fn}]`:''}${gn?` (${gn})`:''}`;;
  const qty=xQty?parseInt(xQty.replace(' x','')):1;
  const basePrice=Number(popItem.price);
  const adjTotal=Object.values(popSels.groups).flat().reduce((s,x)=>s+(x.priceAdj||0),0);
  const price=(basePrice+adjTotal)*qty;
  if(popEditIdx>-1)eosCart[popEditIdx]={name:finalName,price};
  else eosCart.push({name:finalName,price:basePrice+adjTotal});
  closePop();refreshEosCart();
  // 切到購物車 tab
  eosTab('items',document.querySelectorAll('.eos-tab')[1]);
}

async function renderCal(){

  document.getElementById('cal-label').textContent=`${calY} 年 ${mn[calM]}`;

  const all=data||[];const map={};
  all.filter(o=>o.booking_date).forEach(o=>{const tw=twDate(o.booking_date);const k=`${tw.getUTCFullYear()}-${String(tw.getUTCMonth()+1).padStart(2,'0')}-${String(tw.getUTCDate()).padStart(2,'0')}`;if(!map[k])map[k]=[];map[k].push(o);});
  const noDate=all.filter(o=>!o.booking_date&&o.status==='pending');
  const bar=document.getElementById('no-date-bar');
  if(noDate.length){bar.style.display='block';document.getElementById('no-date-list').innerHTML=noDate.map(o=>`<span class="no-date-chip" onclick="openEditOrder('${o.id}')">${o.customer_name}</span>`).join('');}
  else bar.style.display='none';
  const firstDay=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  const todStr=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
  let html='';
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todStr;const dow=(firstDay+d-1)%7;const ords=map[ds]||[];
    const nc=!isToday&&dow===0?'sun':!isToday&&dow===6?'sat':'';
    html+=`<div class="cal-cell ${isToday?'today':''}" onclick="openCalDay('${ds}')">
      <div class="dn ${isToday?'':nc}">${d}</div>
      ${ords.length?`<div class="cal-cnt">${ords.length}</div>`:''}
      <div class="cal-dots">${ords.slice(0,2).map(o=>{const tw=twDate(o.booking_date);return`<div class="cal-dot-item">${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')} ${o.customer_name}</div>`;}).join('')}${ords.length>2?`<div style="font-size:8px;color:var(--stone);font-weight:700">+${ords.length-2}</div>`:''}</div>
    </div>`;
  }
  document.getElementById('cal-cells').innerHTML=html;
}
async function openCalDay(ds){
  const{data}=await _s.from('orders').select('*');
  const orders=(data||[]).filter(o=>{
    if(!o.booking_date)return false;
    const tw=twDate(o.booking_date);
    return`${tw.getUTCFullYear()}-${String(tw.getUTCMonth()+1).padStart(2,'0')}-${String(tw.getUTCDate()).padStart(2,'0')}`===ds;
  }).sort((a,b)=>{if(a.status!==b.status)return a.status==='pending'?-1:1;return new Date(a.booking_date)-new Date(b.booking_date);});
  const[y,m,d]=ds.split('-');
  const wd=['日','一','二','三','四','五','六'][new Date(parseInt(y),parseInt(m)-1,parseInt(d)).getDay()];
  document.getElementById('cal-day-title').textContent=`${parseInt(m)}月${parseInt(d)}日（週${wd}）共 ${orders.length} 筆`;
  document.getElementById('cal-day-body').innerHTML=orders.length===0
    ?'<div class="empty-state"><p style="font-size:13px;font-weight:700">當日無訂單</p></div>'
    :orders.map(o=>{
      const tw=twDate(o.booking_date);const hhmm=`${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`;
      const synced=o.status==='synced';
      const pax=[o.adult_count>0?`大${o.adult_count}`:'',o.kid_count>0?`小${o.kid_count}`:'',o.child_count>0?`幼${o.child_count}`:''].filter(Boolean).join(' ');
      return`<div style="background:white;border:1px solid var(--border);border-left:3px solid ${synced?'#10b981':'var(--gold)'};border-radius:12px;padding:12px 14px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="status-dot ${synced?'synced':'pending'}"></div>
          <div style="font-weight:900;font-size:14px;flex:1">${o.customer_name}</div>
          <div style="font-family:'Noto Serif TC',serif;font-weight:900;color:var(--gold)">${hhmm}</div>
        </div>
        <div style="font-size:12px;color:var(--stone)">${o.phone||'—'}${pax?' · '+pax:''}${o.table_no?' · 桌'+o.table_no:''}</div>
        <div style="font-size:13px;font-weight:900;color:var(--pine);margin-top:4px">$${o.total_price}</div>
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="btn btn-gold btn-sm" style="flex:1" onclick="closeSheet('cal-day-sheet');openEditOrder('${o.id}')">✏️ 編輯</button>
          <button class="btn btn-sm ${synced?'btn-ghost':'btn-primary'}" style="flex:1" onclick="toggleStatus('${o.id}','${o.status}');closeSheet('cal-day-sheet');renderCal()">${synced?'↩ 待處理':'✓ 完成'}</button>
        </div>
      </div>`;
    }).join('');
  openSheet('cal-day-sheet');
}

// ── REPORT ──
let rptData=null;
function rptInit(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('r-s').value=today;
  document.getElementById('r-e').value=today;
  fetchReport();
}
function rptPreset(type,el){
  el.closest('.seg-row').querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const now=new Date(),today=now.toISOString().split('T')[0];
  const sd=document.getElementById('r-s'),ed=document.getElementById('r-e');
  if(type==='today'){sd.value=ed.value=today;}
  else if(type==='week'){const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));sd.value=mon.toISOString().split('T')[0];ed.value=today;}
  else if(type==='month'){sd.value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];ed.value=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];}
  fetchReport();
}
function rptTab(name,el){
  ['prepare','setmenu','orders'].forEach(t=>document.getElementById(`rpt-${t}`).style.display=t===name?'block':'none');
  el.closest('.seg-row').querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
async function fetchReport(){
  const sd=document.getElementById('r-s').value,ed=document.getElementById('r-e').value;
  if(!sd||!ed){toast('請選擇日期','warn');return;}
  document.getElementById('rpt-prepare').innerHTML='<div class="loading"><div class="spin"></div></div>';
  const{data:orders}=await _s.from('orders').select('*').gte('booking_date',`${sd}T00:00:00+08:00`).lte('booking_date',`${ed}T23:59:59+08:00`).order('booking_date',{ascending:true});
  const o=orders||[];
  const dishCount={},setCount={},setDetail={};
  let tA=0,tK=0,tC=0,tRev=0;
  // 查哪些是套餐品項（is_set_menu=true）
  const{data:setItemsAdm}=await _s.from('menu_items').select('name').eq('is_set_menu',true);
  const setMenuNamesAdm=new Set((setItemsAdm||[]).map(i=>i.name));
  o.forEach(ord=>{
    tA+=(ord.adult_count||0);tK+=(ord.kid_count||0);tC+=(ord.child_count||0);tRev+=(ord.total_price||0);
    (ord.order_content||[]).forEach(item=>{
      const{qty,flv,clean,inner,isSet,brand}=parseItem(item.name);
      if(isSet){
        setCount[brand]=(setCount[brand]||0)+qty;
        if(!setDetail[brand])setDetail[brand]={};
        if(setMenuNamesAdm.has(brand)){
          // 真正的套餐 → 子品項拆開統計（智慧分割，忽略括號內的、）
          const subItemsAdm=[];let depthAdm=0,curAdm='';
          for(const ch of (inner||'')){
            if(ch==='('){depthAdm++;curAdm+=ch;}
            else if(ch===')'){depthAdm--;curAdm+=ch;}
            else if(ch==='、'&&depthAdm===0){subItemsAdm.push(curAdm.trim());curAdm='';}
            else curAdm+=ch;
          }
          if(curAdm.trim())subItemsAdm.push(curAdm.trim());
          subItemsAdm.forEach(raw=>{
            const sQM2=raw.match(/\) x(\d+)$/);const sQM3=raw.match(/^[^(]* x(\d+)$/);
            const sq=sQM2?parseInt(sQM2[1]):sQM3?parseInt(sQM3[1]):1;
            let sc=raw.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
            sc=sc.replace(/\s*\(([^)]+)\)/g,(_,inner)=>inner.split('、').map(s=>`[${s.trim()}]`).join(''));
            if(!sc)return;
            dishCount[sc]=(dishCount[sc]||0)+qty*sq;
            setDetail[brand][sc]=(setDetail[brand][sc]||0)+qty*sq;
          });
        }else{
          // 口味選擇型 → 整組顯示
          const innerFmtAdm=inner?inner.split('、').map(s=>`[${s.trim()}]`).join(''):'';
          const fullKey_=brand+innerFmtAdm;
          dishCount[fullKey_]=(dishCount[fullKey_]||0)+qty;
          setDetail[brand][fullKey_]=(setDetail[brand][fullKey_]||0)+qty;
        }
      }else{const key_=flv?`${clean} [${flv}]`:clean;dishCount[key_]=(dishCount[key_]||0)+qty;}
    });
  });
  rptData={orders:o,dishCount,setCount,setDetail};
  document.getElementById('rpt-kpis').innerHTML=[
    {l:'訂單',v:o.length,u:'筆',c:'var(--pine)'},{l:'大人',v:tA,c:'var(--gold)'},{l:'小孩',v:tK,c:'var(--gold)'},
    {l:'兒童',v:tC,c:'var(--gold)'},{l:'總人數',v:tA+tK+tC,u:'位',c:'#3b82f6'},{l:'預估營收',v:'$'+tRev.toLocaleString(),c:'#f43f5e'},
  ].map(k=>`<div style="flex-shrink:0;background:white;border:1px solid var(--border);border-radius:14px;padding:12px 14px;min-width:80px"><div style="font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:900;color:${k.c}">${k.v}</div><div style="font-size:10px;font-weight:700;color:var(--stone);text-transform:uppercase;margin-top:2px">${k.l}${k.u?' · '+k.u:''}</div></div>`).join('');
  const sorted=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]);const maxQ=sorted[0]?.[1]||1;
  document.getElementById('rpt-prepare').innerHTML=`<div style="background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden"><div style="padding:12px 14px;background:#1e293b;display:flex;justify-content:space-between;align-items:center"><span style="color:white;font-weight:700;font-size:13px">🍳 備料總表</span><span style="background:#475569;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px">${sorted.length} 項</span></div><div style="overflow-y:auto;max-height:50vh">${sorted.map(([k,count],i)=>{const pct=Math.round(count/maxQ*100);return`<div style="padding:10px 14px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:10px"><span style="font-size:11px;font-weight:700;color:#94a3b8;width:20px;flex-shrink:0">${i+1}</span><div style="flex:1"><div style="font-size:13px;font-weight:700;word-break:break-all">${k}</div><div style="height:5px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:4px"><div style="height:100%;border-radius:999px;width:${pct}%;background:var(--pine)"></div></div></div><div style="font-family:'Noto Serif TC',serif;font-size:18px;font-weight:900;color:var(--pine);flex-shrink:0">${count}</div></div>`;}).join('')||'<div style="text-align:center;padding:32px;color:var(--stone);font-size:13px;font-weight:700">查無資料</div>'}</div></div>`;
  const setEntries=Object.entries(setCount).sort((a,b)=>b[1]-a[1]);
  document.getElementById('rpt-setmenu').innerHTML=setEntries.length===0?'<div style="text-align:center;padding:32px;color:var(--stone);font-size:13px;font-weight:700">查無套餐</div>':setEntries.map(([name,count])=>`<div style="background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px"><div style="padding:10px 14px;background:rgba(184,145,80,.08);border-bottom:1px solid rgba(184,145,80,.2);display:flex;justify-content:space-between;align-items:center"><span style="font-weight:900;color:var(--pine)">${name}</span><span style="font-family:'Noto Serif TC',serif;font-size:18px;font-weight:900;color:var(--gold)">${count} 套</span></div><div style="padding:8px 14px">${Object.entries(setDetail[name]||{}).map(([sn,sc])=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc"><span style="font-size:12px;flex:1;font-weight:600">${sn}</span><span style="font-weight:900;color:var(--pine)">${sc} 份</span></div>`).join('')}</div></div>`).join('');
  document.getElementById('rpt-orders').innerHTML=o.length===0?'<div style="text-align:center;padding:32px;color:var(--stone);font-size:13px;font-weight:700">查無訂單</div>':o.map(ord=>{const tw=ord.booking_date?twDate(ord.booking_date):null;const hhmm=tw?`${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`:'—';const synced=ord.status==='synced';return`<div style="background:white;border:1px solid var(--border);border-left:3px solid ${synced?'#10b981':'var(--gold)'};border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px"><div class="status-dot ${synced?'synced':'pending'}"></div><div style="flex:1;min-width:0"><div style="font-weight:900;font-size:14px">${ord.customer_name}</div><div style="font-size:12px;color:var(--stone);margin-top:2px">${ord.phone||'—'} · <span style="font-weight:900;color:var(--pine)">$${ord.total_price}</span>${ord.table_no?' · 桌'+ord.table_no:''}</div></div><div style="font-family:'Noto Serif TC',serif;font-weight:900;color:var(--gold);flex-shrink:0">${hhmm}</div></div>`;}).join('');
  document.getElementById('rpt-export-btn').style.display='block';
}
function exportXls(){
  if(!rptData||typeof XLSX==='undefined'){toast('請先查詢','warn');return;}
  const wb=XLSX.utils.book_new();
  const rows=rptData.orders.map(o=>({'姓名':o.customer_name,'電話':o.phone,'總額':o.total_price,'桌號':o.table_no,'活動':o.campaign_code,'訂位':o.booking_date,'狀態':o.status==='synced'?'已完成':'待處理','備註':o.note,'後台備註':o.admin_note}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'訂單');
  const rows2=Object.entries(rptData.dishCount||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({'品名':k,'數量':v}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows2),'🍳 備料總表');
  XLSX.writeFile(wb,`真珠報表_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.xlsx`);
  toast('Excel 已匯出 📊');
}

  const{data:{session}}=await _s.auth.getSession();
  if(session){document.getElementById('login-screen').classList.add('hidden');initApp();}
