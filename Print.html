<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#004d40">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="真珠列印">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="https://www.jinzhu.com.tw/favicon.ico">
<link rel="icon" type="image/x-icon" href="https://www.jinzhu.com.tw/favicon.ico">
<title>真珠 · 列印站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --pine:#004d40;--pine2:#00695c;
  --gold:#b89150;--gold2:#d4a85a;
  --ink:#1e293b;--stone:#64748b;--mist:#94a3b8;
  --border:#e2e8f0;--bg:#f0f4f3;
  --r:14px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--pine);height:56px;
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
}
.tl{display:flex;align-items:center;gap:10px}
.tlogo{width:28px;height:28px;object-fit:contain;filter:brightness(0) invert(1)}
.ttitle{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:900;color:white;letter-spacing:.1em}
.tsub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
.tbadge{font-size:11px;font-weight:700;background:rgba(255,255,255,.15);color:white;border-radius:999px;padding:4px 12px}

/* INSTALL BANNER */
#install-banner{
  display:none;background:var(--pine2);
  padding:10px 16px;align-items:center;gap:12px;
}
#install-banner.show{display:flex}
.ib-text{font-size:12px;font-weight:700;color:white;flex:1}
.ib-text small{display:block;font-weight:400;opacity:.7;font-size:10px;margin-top:1px}
.ib-btn{background:white;color:var(--pine);border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;flex-shrink:0}
.ib-x{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}

/* MAIN */
.main{padding:12px 12px 96px}

/* CARD */
.card{background:white;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,77,64,.08);overflow:hidden;margin-bottom:12px}
.ch{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ch-icon{font-size:15px}
.ch-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone)}
.cb{padding:14px 16px}

/* DATE CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:7px 16px;border-radius:999px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:white;color:var(--stone);cursor:pointer;transition:all .15s;font-family:inherit}
.chip.on,.chip:active{background:var(--pine);color:white;border-color:var(--pine)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone)}
.field input{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--ink);background:#f8fafc;outline:none;font-family:inherit;transition:border .2s}
.field input:focus{border-color:var(--pine);background:white}
.qbtn{
  width:100%;margin-top:12px;padding:14px;
  background:var(--pine);color:white;
  border:none;border-radius:var(--rs);
  font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.05em;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;
}
.qbtn:active{opacity:.85;transform:scale(.99)}

/* VIEW TABS */
.vtabs{display:grid;grid-template-columns:1fr 1fr;margin-bottom:12px;background:white;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 10px rgba(0,77,64,.08)}
.vtab{padding:12px;text-align:center;font-size:13px;font-weight:700;color:var(--stone);cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.vtab:first-child{border-right:1px solid var(--border)}
.vtab.on{background:var(--pine);color:white}

/* KPI */
.kpi-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{background:white;border-radius:var(--rs);border:1px solid var(--border);padding:10px 8px;text-align:center;box-shadow:0 2px 10px rgba(0,77,64,.06)}
.kv{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:900;color:var(--pine);line-height:1;margin-bottom:3px}
.kl{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mist)}

/* SELECT ALL */
.sal{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:#f8fafc}
.sal-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--stone);cursor:pointer;-webkit-user-select:none;user-select:none}
.ocb{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ocb.on{background:var(--pine);border-color:var(--pine)}
.ocb-tick{color:white;font-size:12px;font-weight:900;line-height:1}
.sel-badge{font-size:11px;font-weight:700;color:var(--pine);background:rgba(0,77,64,.08);padding:3px 10px;border-radius:999px}

/* ORDER ITEMS */
.oi{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:background .12s}
.oi:last-child{border-bottom:none}
.oi:active{background:#f8fafc}
.oi.on{background:rgba(0,77,64,.04)}
.oi-cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;margin-top:2px}
.oi.on .oi-cb{background:var(--pine);border-color:var(--pine)}
.oi-info{flex:1;min-width:0}
.oi-nr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
.oi-name{font-size:14px;font-weight:900;color:var(--ink)}
.oi-time{font-size:11px;font-weight:700;color:var(--pine);background:rgba(0,77,64,.08);padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.oi-meta{font-size:11px;color:var(--stone);margin-bottom:3px}
.oi-prev{font-size:10px;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oi-price{font-size:12px;font-weight:900;color:var(--gold);white-space:nowrap;margin-top:2px}

/* DISH TABLE */
.dtable{width:100%;border-collapse:collapse}
.dtable th{background:#f8fafc;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);padding:8px 16px;text-align:left;border-bottom:1px solid var(--border)}
.dtable td{padding:10px 16px;font-size:13px;border-bottom:1px solid #f8fafc}
.dtable tr:last-child td{border-bottom:none}
.dqty{font-weight:900;color:var(--pine);font-size:15px;text-align:right}
.dbar{height:4px;border-radius:2px;background:rgba(0,77,64,.1);margin-top:4px}
.dbar-f{height:100%;border-radius:2px;background:var(--gold);transition:width .4s}
.set-pill{display:inline-flex;font-size:9px;font-weight:700;background:rgba(184,145,80,.12);color:var(--gold);padding:1px 6px;border-radius:999px;margin-left:4px;vertical-align:middle}

/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100}
.pbtn{flex:1;padding:14px;background:var(--pine);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:all .2s}
.pbtn:active{opacity:.85;transform:scale(.99)}
.pbtn:disabled{opacity:.4;pointer-events:none}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--stone)}
.ei{font-size:2.5rem;opacity:.2;margin-bottom:12px}
.et{font-size:13px;font-weight:700}
.es{font-size:11px;color:var(--mist);margin-top:4px}

/* ════════════════════════════
   PRINT STYLES — 58mm 熱感應紙
   ════════════════════════════ */
@media print{
  @page{size:58mm auto;margin:2mm 3mm}

  /* 隱藏所有畫面 UI */
  .topbar,.main,.vtabs,.kpi-bar,.sal,.bbar,
  #install-banner,.no-print{display:none!important}

  body{background:white;font-size:14px;-webkit-print-color-adjust:exact}

  /* ── 單張訂單收據 ── */
  .print-receipts{display:block!important}
  .pr-page{page-break-after:always;padding:4px 0}
  .pr-page:last-child{page-break-after:avoid}

  .pr-shop{text-align:center;font-size:15px;font-weight:900;letter-spacing:.1em;margin-bottom:3px}
  .pr-period{text-align:center;font-size:11px;color:#555;margin-bottom:6px}
  .pr-dash{border:none;border-top:1.5px dashed #aaa;margin:5px 0}

  /* 客人資訊 */
  .pr-name{font-size:16px;font-weight:900;margin-bottom:2px}
  .pr-meta{font-size:12px;color:#444;margin-bottom:2px}
  .pr-time{font-size:12px;font-weight:700;margin-bottom:6px}

  /* 套餐框 */
  .pr-set{border:1.5px solid #aaa;border-radius:4px;margin-bottom:5px;overflow:hidden}
  .pr-set-head{background:#eee;padding:3px 6px;font-size:12px;font-weight:900;display:flex;justify-content:space-between}
  .pr-set-body{padding:2px 8px}
  .pr-set-item{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid #f0f0f0}
  .pr-set-item:last-child{border-bottom:none}

  /* 單點框 */
  .pr-singles{border:1px solid #ccc;border-radius:4px;margin-bottom:5px;overflow:hidden}
  .pr-singles-head{background:#f5f5f5;padding:3px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#666}
  .pr-single-item{display:flex;justify-content:space-between;font-size:12px;padding:3px 8px;border-bottom:1px solid #f0f0f0}
  .pr-single-item:last-child{border-bottom:none}

  .pr-note{font-size:11px;color:#555;margin-top:4px;padding:3px 6px;border-left:3px solid #333}
  .pr-total{display:flex;justify-content:space-between;font-size:14px;font-weight:900;padding-top:5px;border-top:1.5px dashed #aaa;margin-top:4px}
}
/* 預設隱藏列印區 */
.print-receipts{display:none}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="tl">
    <img class="tlogo" src="https://www.jinzhu.com.tw/images/Jinzhu_logo.svg" onerror="this.style.display='none'">
    <div>
      <div class="ttitle">真珠 · 列印</div>
      <div class="tsub">Print Station</div>
    </div>
  </div>
  <span class="tbadge" id="topbar-date"></span>
</div>

<!-- Install Banner -->
<div id="install-banner">
  <div class="ib-text">
    加入主畫面，快速開啟
    <small>安裝為 App，使用更方便</small>
  </div>
  <button class="ib-btn" id="install-btn">安裝</button>
  <button class="ib-x" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>

<!-- Main -->
<div class="main">

  <!-- 篩選 -->
  <div class="card">
    <div class="ch"><span class="ch-icon">🗓</span><span class="ch-title">選擇日期</span></div>
    <div class="cb">
      <div class="chips">
        <button class="chip on" onclick="setChip(this,'today')">今日</button>
        <button class="chip" onclick="setChip(this,'tomorrow')">明日</button>
        <button class="chip" onclick="setChip(this,'week')">本週</button>
        <button class="chip" onclick="setChip(this,'custom')">自訂</button>
      </div>
      <div id="custom-date" style="display:none">
        <div class="frow">
          <div class="field"><span class="flabel">開始日期</span><input type="date" id="date-start"></div>
          <div class="field"><span class="flabel">結束日期</span><input type="date" id="date-end"></div>
        </div>
      </div>
      <button class="qbtn" onclick="doQuery()"><span id="qbt">▶ 查詢訂單</span></button>
    </div>
  </div>

  <!-- 結果區 -->
  <div id="result-area" style="display:none">

    <div class="vtabs">
      <button class="vtab on" id="tab-orders" onclick="switchView('orders')">🪑 預約明細</button>
      <button class="vtab" id="tab-dish" onclick="switchView('dish')">🍳 品項總計</button>
    </div>

    <div class="kpi-bar">
      <div class="kpi"><div class="kv" id="kpi-orders">0</div><div class="kl">訂單</div></div>
      <div class="kpi"><div class="kv" id="kpi-pax">0</div><div class="kl">總人數</div></div>
      <div class="kpi"><div class="kv" id="kpi-checked">0</div><div class="kl">已勾選</div></div>
    </div>

    <!-- 預約明細 -->
    <div id="view-orders">
      <div class="card">
        <div class="sal">
          <div class="sal-label" onclick="toggleSelectAll()">
            <div class="ocb" id="sa-cb"><span class="ocb-tick" id="sa-tick"></span></div>
            <span>全選</span>
          </div>
          <span class="sel-badge" id="sel-badge">已選 0 筆</span>
        </div>
        <div id="order-list"></div>
      </div>
    </div>

    <!-- 品項總計 -->
    <div id="view-dish" style="display:none">
      <div class="card">
        <table class="dtable">
          <thead><tr><th>品項名稱</th><th style="text-align:right">數量</th></tr></thead>
          <tbody id="dish-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 空狀態 -->
  <div class="empty" id="empty-state">
    <div class="ei">🖨</div>
    <div class="et">選擇日期後查詢</div>
    <div class="es">可勾選訂單後一鍵列印</div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bbar">
  <button class="pbtn" id="pbtn" onclick="doPrint()" disabled>🖨 列印勾選訂單</button>
</div>

<!-- Print Output -->
<div class="print-receipts" id="print-receipts"></div>

<script>
const SB_URL='https://pydlnqriztpzgxbjuohm.supabase.co';
const SB_KEY='sb_publishable_ISKUWOXUR9A-1y81xCOUXg_8-zNle3v';
const _s=supabase.createClient(SB_URL,SB_KEY);

let allOrders=[], checkedIds=new Set(), curPeriod='';

// 日期初始化
(function(){
  const now=new Date();
  document.getElementById('topbar-date').textContent=`${now.getMonth()+1}/${now.getDate()}`;
  setDateRange('today');
})();

function setChip(el,type){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('custom-date').style.display=type==='custom'?'block':'none';
  if(type!=='custom') setDateRange(type);
}

function setDateRange(type){
  const t=new Date();
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let s,e;
  if(type==='today'){s=e=fmt(t);}
  else if(type==='tomorrow'){const d=new Date(t);d.setDate(d.getDate()+1);s=e=fmt(d);}
  else if(type==='week'){const m=new Date(t);m.setDate(t.getDate()-((t.getDay()+6)%7));const su=new Date(m);su.setDate(m.getDate()+6);s=fmt(m);e=fmt(su);}
  document.getElementById('date-start').value=s||'';
  document.getElementById('date-end').value=e||'';
}

async function doQuery(){
  const ds=document.getElementById('date-start').value;
  const de=document.getElementById('date-end').value;
  if(!ds||!de){alert('請選擇日期');return;}
  const btn=document.getElementById('qbt');
  btn.textContent='查詢中…';
  const{data,error}=await _s.from('orders').select('*')
    .gte('booking_date',`${ds}T00:00:00+08:00`)
    .lte('booking_date',`${de}T23:59:59+08:00`)
    .order('booking_date',{ascending:true});
  btn.textContent='▶ 查詢訂單';
  if(error){alert('查詢失敗：'+error.message);return;}
  allOrders=data||[];
  checkedIds=new Set(allOrders.map(o=>o.id));
  curPeriod=ds===de?ds:`${ds} ～ ${de}`;
  document.getElementById('empty-state').style.display='none';
  document.getElementById('result-area').style.display='block';
  renderOrders();renderDish();updateKpi();
}

function renderOrders(){
  const list=document.getElementById('order-list');
  if(!allOrders.length){
    list.innerHTML=`<div class="empty" style="padding:32px"><div class="ei">📋</div><div class="et">此區間無訂單</div></div>`;
    return;
  }
  list.innerHTML=allOrders.map(o=>{
    const on=checkedIds.has(o.id);
    const tw=o.booking_date?new Date(new Date(o.booking_date).getTime()+8*3600000):null;
    const hhmm=tw?`${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`:'—';
    const pax=[o.adult_count?`大${o.adult_count}`:'',o.kid_count?`孩${o.kid_count}`:'',o.child_count?`兒${o.child_count}`:''].filter(Boolean).join(' ');
    const prev=(o.order_content||[]).map(i=>{
      const q=i.name.match(/ x(\d+)/);
      return i.name.split(' (')[0].split(' [')[0].replace(/ x\d+/g,'').trim()+(q?`×${q[1]}`:'');
    }).join('、');
    return`<div class="oi ${on?'on':''}" onclick="toggleOrder('${o.id}',this)" data-id="${o.id}">
      <div class="oi-cb"><span class="ocb-tick">${on?'✓':''}</span></div>
      <div class="oi-info">
        <div class="oi-nr">
          <span class="oi-name">${o.customer_name||'—'}${o.table_no?` · 桌${o.table_no}`:''}</span>
          <span class="oi-time">${hhmm}</span>
        </div>
        <div class="oi-meta">${o.phone||'—'}${pax?' · '+pax:''}</div>
        <div class="oi-prev">${prev||'—'}</div>
      </div>
      <div class="oi-price">$${o.total_price||0}</div>
    </div>`;
  }).join('');
  updateSAState();
}

function renderDish(){
  const dish={},sets={};
  allOrders.forEach(o=>{
    (o.order_content||[]).forEach(item=>{
      const qM=item.name.match(/ x(\d+)/),qty=qM?parseInt(qM[1]):1;
      let clean=item.name.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
      const pi=clean.indexOf(' ('),inner=pi>-1?clean.slice(pi+2,-1):null;
      if(inner&&inner.includes('、')){
        const brand=clean.slice(0,pi).trim();
        sets[brand]=(sets[brand]||0)+qty;
        inner.split('、').forEach(sub=>{
          const sM=sub.match(/ x(\d+)/),sq=sM?parseInt(sM[1]):1;
          const s=sub.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
          if(s) dish[s]=(dish[s]||0)+qty*sq;
        });
      } else dish[clean]=(dish[clean]||0)+qty;
    });
  });
  const sorted=Object.entries(dish).sort((a,b)=>b[1]-a[1]);
  const maxQ=sorted[0]?.[1]||1;
  let html='';
  Object.entries(sets).sort((a,b)=>b[1]-a[1]).forEach(([n,c])=>{
    html+=`<tr><td><b>${n}</b><span class="set-pill">套餐</span><div class="dbar"><div class="dbar-f" style="width:${Math.round(c/maxQ*100)}%"></div></div></td><td class="dqty">${c}</td></tr>`;
  });
  sorted.forEach(([n,c])=>{
    html+=`<tr><td>${n}<div class="dbar"><div class="dbar-f" style="width:${Math.round(c/maxQ*100)}%"></div></div></td><td class="dqty">${c}</td></tr>`;
  });
  document.getElementById('dish-body').innerHTML=html||`<tr><td colspan="2" style="text-align:center;padding:24px;color:var(--mist)">無品項資料</td></tr>`;
}

function toggleOrder(id,el){
  if(checkedIds.has(id)) checkedIds.delete(id); else checkedIds.add(id);
  el.classList.toggle('on',checkedIds.has(id));
  el.querySelector('.ocb-tick').textContent=checkedIds.has(id)?'✓':'';
  updateKpi();updateSAState();
}

function toggleSelectAll(){
  if(checkedIds.size===allOrders.length) checkedIds.clear();
  else allOrders.forEach(o=>checkedIds.add(o.id));
  renderOrders();updateKpi();
}

function updateSAState(){
  const all=checkedIds.size===allOrders.length&&allOrders.length>0;
  const cb=document.getElementById('sa-cb');
  document.getElementById('sa-tick').textContent=all?'✓':'';
  cb.style.background=all?'var(--pine)':'white';
  cb.style.borderColor=all?'var(--pine)':'var(--border)';
}

function updateKpi(){
  const totalPax=allOrders.reduce((s,o)=>s+(o.adult_count||0)+(o.kid_count||0)+(o.child_count||0),0);
  document.getElementById('kpi-orders').textContent=allOrders.length;
  document.getElementById('kpi-pax').textContent=totalPax;
  document.getElementById('kpi-checked').textContent=checkedIds.size;
  document.getElementById('sel-badge').textContent=`已選 ${checkedIds.size} 筆`;
  document.getElementById('pbtn').disabled=checkedIds.size===0;
}

function switchView(v){
  document.getElementById('view-orders').style.display=v==='orders'?'block':'none';
  document.getElementById('view-dish').style.display=v==='dish'?'block':'none';
  document.getElementById('tab-orders').classList.toggle('on',v==='orders');
  document.getElementById('tab-dish').classList.toggle('on',v==='dish');
}

// ── 列印 ── 58mm 熱感應紙，套餐/單點分框
function doPrint(){
  const toPrint=allOrders.filter(o=>checkedIds.has(o.id));
  if(!toPrint.length){alert('請先勾選訂單');return;}

  const twStr=iso=>{
    if(!iso) return '—';
    const tw=new Date(new Date(iso).getTime()+8*3600000);
    return `${String(tw.getUTCMonth()+1).padStart(2,'0')}/${String(tw.getUTCDate()).padStart(2,'0')} ${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`;
  };

  document.getElementById('print-receipts').innerHTML=toPrint.map(o=>{
    const pax=[o.adult_count?`大人${o.adult_count}`:'',o.kid_count?`小孩${o.kid_count}`:'',o.child_count?`兒童${o.child_count}`:''].filter(Boolean).join('　');

    // 解析套餐 / 單點（與訂單監控相同邏輯）
    const sets=[],singles={};
    (o.order_content||[]).forEach(item=>{
      const qM=item.name.match(/ x(\d+)/),qty=qM?parseInt(qM[1]):1;
      let clean=item.name.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
      const pi=clean.indexOf(' ('),inner=pi>-1?clean.slice(pi+2,-1):null;
      if(inner&&inner.includes('、')){
        const brand=clean.slice(0,pi).trim(),subs={};
        inner.split('、').forEach(sub=>{
          const sM=sub.match(/ x(\d+)/),sq=sM?parseInt(sM[1]):1;
          const s=sub.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
          if(s) subs[s]=(subs[s]||0)+qty*sq;
        });
        sets.push({brand,qty,subs});
      } else singles[clean]=(singles[clean]||0)+qty;
    });

    const setsHtml=sets.map(set=>`
      <div class="pr-set">
        <div class="pr-set-head">
          <span>🍱 ${set.brand}</span>
          <span>${set.qty} 套</span>
        </div>
        <div class="pr-set-body">
          ${Object.entries(set.subs).map(([n,c])=>`<div class="pr-set-item"><span>${n}</span><span>${c} 份</span></div>`).join('')}
        </div>
      </div>`).join('');

    const singlesEntries=Object.entries(singles);
    const singlesHtml=singlesEntries.length?`
      <div class="pr-singles">
        <div class="pr-singles-head">單點</div>
        ${singlesEntries.map(([n,c])=>`<div class="pr-single-item"><span>${n}</span><span>${c} 份</span></div>`).join('')}
      </div>`:''

    return`<div class="pr-page">
      <div class="pr-shop">真珠 文心店</div>
      <div class="pr-period">${curPeriod}</div>
      <hr class="pr-dash">
      <div class="pr-name">${o.customer_name||'—'}${o.table_no?` · 桌${o.table_no}`:''}</div>
      <div class="pr-meta">${o.phone||'—'}${pax?'　'+pax:''}</div>
      <div class="pr-time">訂位：${twStr(o.booking_date)}</div>
      <hr class="pr-dash">
      ${setsHtml}${singlesHtml}
      ${o.note?`<div class="pr-note">備註：${o.note}</div>`:''}
      <div class="pr-total"><span>合計</span><span>$${o.total_price||0}</span></div>
    </div>`;
  }).join('');

  window.print();
}

// ── PWA Install ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt=null;
      document.getElementById('install-banner').classList.remove('show');
    });
  }
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
</script>

<!-- Service Worker for PWA -->
<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='jinzhu-print-v1';
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(
        fetch(e.request).catch(()=>caches.match(e.request))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
