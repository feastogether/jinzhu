<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#004d40">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="真珠列印">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" href="https://www.jinzhu.com.tw/favicon.ico">
<link rel="icon" type="image/x-icon" href="https://www.jinzhu.com.tw/favicon.ico">
<title>真珠 · 列印站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --pine:#004d40; --pine2:#00695c; --pine3:#00897b;
  --gold:#b89150; --gold2:#d4a85a;
  --ink:#1e293b; --stone:#64748b; --mist:#94a3b8;
  --border:#e2e8f0; --bg:#f0f4f3; --white:#ffffff;
  --radius:14px; --radius-sm:10px;
  --shadow:0 2px 12px rgba(0,77,64,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--pine);
  padding:0 16px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 16px rgba(0,0,0,.2);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{
  width:28px;height:28px;object-fit:contain;
  filter:brightness(0) invert(1);
}
.topbar-title{
  font-family:'Noto Serif TC',serif;
  font-size:1rem;font-weight:900;
  color:white;letter-spacing:.1em;
}
.topbar-sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.topbar-badge{
  font-size:10px;font-weight:700;
  background:rgba(255,255,255,.15);
  color:white;border-radius:999px;
  padding:3px 10px;letter-spacing:.05em;
}

/* ── INSTALL BANNER ── */
#install-banner{
  display:none;
  background:linear-gradient(135deg,var(--pine2),var(--pine3));
  padding:10px 16px;
  align-items:center;justify-content:space-between;gap:12px;
}
#install-banner.show{display:flex}
.install-text{font-size:12px;font-weight:700;color:white;flex:1}
.install-text small{display:block;font-weight:400;opacity:.7;font-size:10px;margin-top:1px}
.install-btn{
  background:white;color:var(--pine);
  border:none;border-radius:8px;
  padding:7px 14px;font-size:12px;font-weight:900;
  cursor:pointer;white-space:nowrap;font-family:inherit;
  flex-shrink:0;
}
.install-dismiss{
  background:none;border:none;color:rgba(255,255,255,.6);
  font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;
}

/* ── MAIN CONTENT ── */
.main{padding:12px 12px 100px}

/* ── FILTER CARD ── */
.card{
  background:var(--white);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.card-head{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.card-head-icon{font-size:16px}
.card-head-title{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone)}
.card-body{padding:14px 16px}

/* 日期快選 */
.date-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{
  padding:6px 14px;border-radius:999px;
  font-size:12px;font-weight:700;
  border:1.5px solid var(--border);background:var(--white);
  color:var(--stone);cursor:pointer;transition:all .15s;
  font-family:inherit;
}
.chip.active,.chip:active{background:var(--pine);color:white;border-color:var(--pine)}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--stone)}
.field input{
  border:1.5px solid var(--border);border-radius:8px;
  padding:8px 10px;font-size:13px;color:var(--ink);
  background:#f8fafc;outline:none;
  font-family:inherit;transition:border .2s;
}
.field input:focus{border-color:var(--pine);background:white}

/* 查詢按鈕 */
.query-btn{
  width:100%;margin-top:12px;padding:13px;
  background:var(--pine);color:white;
  border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:900;cursor:pointer;
  font-family:inherit;letter-spacing:.05em;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.query-btn:active{opacity:.85;transform:scale(.99)}

/* ── VIEW TABS ── */
.view-tabs{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;background:var(--white);
  border-radius:var(--radius);border:1px solid var(--border);
  overflow:hidden;box-shadow:var(--shadow);
  margin-bottom:12px;
}
.view-tab{
  padding:12px 8px;text-align:center;
  font-size:13px;font-weight:700;
  color:var(--stone);cursor:pointer;
  border:none;background:none;
  font-family:inherit;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.view-tab:first-child{border-right:1px solid var(--border)}
.view-tab.active{background:var(--pine);color:white}

/* ── KPI BAR ── */
.kpi-bar{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:12px;
}
.kpi-card{
  background:var(--white);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  padding:10px 8px;text-align:center;
  box-shadow:var(--shadow);
}
.kpi-val{
  font-family:'Noto Serif TC',serif;
  font-size:1.5rem;font-weight:900;
  color:var(--pine);line-height:1;margin-bottom:3px;
}
.kpi-lbl{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mist)}

/* ── ORDER LIST ── */
.section-label{
  font-size:9px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;
  color:var(--stone);margin-bottom:8px;padding:0 2px;
  display:flex;align-items:center;justify-content:space-between;
}
.select-all-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  background:#f8fafc;
}
.select-all-label{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;color:var(--stone);
  cursor:pointer;
}
.selected-count{
  font-size:11px;font-weight:700;
  color:var(--pine);
  background:rgba(0,77,64,.08);
  padding:3px 10px;border-radius:999px;
}

.order-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;
  border-bottom:1px solid #f8fafc;
  cursor:pointer;transition:background .15s;
}
.order-item:last-child{border-bottom:none}
.order-item:active{background:#f8fafc}
.order-item.checked{background:rgba(0,77,64,.04)}

.order-cb{
  width:20px;height:20px;
  border-radius:6px;border:2px solid var(--border);
  background:white;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.order-item.checked .order-cb{background:var(--pine);border-color:var(--pine)}
.order-cb-tick{color:white;font-size:12px;font-weight:900}

.order-info{flex:1;min-width:0}
.order-name-row{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-bottom:3px;
}
.order-name{font-size:14px;font-weight:900;color:var(--ink)}
.order-time{
  font-size:11px;font-weight:700;
  color:var(--pine);
  background:rgba(0,77,64,.08);
  padding:2px 8px;border-radius:999px;
  white-space:nowrap;flex-shrink:0;
}
.order-meta{font-size:11px;color:var(--stone);margin-bottom:4px}
.order-items-preview{
  font-size:10px;color:var(--mist);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.order-price{font-size:12px;font-weight:900;color:var(--gold);white-space:nowrap}

/* ── DISH TABLE ── */
.dish-table-wrap{overflow:hidden;border-radius:0}
.dish-table{width:100%;border-collapse:collapse}
.dish-table th{
  background:#f8fafc;
  font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:var(--stone);padding:8px 16px;text-align:left;
  border-bottom:1px solid var(--border);
}
.dish-table td{padding:10px 16px;font-size:13px;border-bottom:1px solid #f8fafc}
.dish-table tr:last-child td{border-bottom:none}
.dish-qty{font-weight:900;color:var(--pine);font-size:15px;text-align:right}
.dish-bar{
  height:4px;border-radius:2px;
  background:rgba(0,77,64,.12);margin-top:4px;
}
.dish-bar-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .4s}

.set-badge{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:700;
  background:rgba(184,145,80,.12);color:var(--gold);
  padding:1px 6px;border-radius:999px;margin-left:4px;
}

/* ── BOTTOM ACTION BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:white;
  border-top:1px solid var(--border);
  padding:12px 16px;
  display:flex;gap:8px;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
  z-index:100;
}
.print-btn{
  flex:1;padding:14px;
  background:var(--pine);color:white;
  border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:900;cursor:pointer;
  font-family:inherit;letter-spacing:.05em;
  transition:all .2s;
}
.print-btn:active{opacity:.85;transform:scale(.99)}
.print-btn:disabled{opacity:.4;pointer-events:none}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:48px 24px;
  color:var(--stone);
}
.empty-icon{font-size:2.5rem;opacity:.2;margin-bottom:12px}
.empty-text{font-size:13px;font-weight:700}
.empty-sub{font-size:11px;color:var(--mist);margin-top:4px}

/* ── PRINT STYLES ── */
@media print{
  @page{size:58mm auto;margin:2mm 3mm}
  body{background:white;font-size:13px}
  .topbar,.main>.card,.view-tabs,.kpi-bar,.section-label,
  .select-all-row,.bottom-bar,#install-banner,.no-print{display:none!important}
  
  .print-receipt{display:block!important}
  .receipt-item{
    page-break-after:always;
    padding:4px 0;
  }
  .receipt-item:last-child{page-break-after:avoid}
  
  .r-shop{text-align:center;font-size:14px;font-weight:900;margin-bottom:2px}
  .r-date{text-align:center;font-size:10px;color:#555;margin-bottom:6px}
  .r-divider{border:none;border-top:1px dashed #aaa;margin:5px 0}
  .r-name{font-size:14px;font-weight:900}
  .r-meta{font-size:10px;color:#555;margin-bottom:4px}
  .r-time{font-size:11px;font-weight:700;margin-bottom:4px}
  .r-item{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #eee}
  .r-item:last-child{border-bottom:none}
  .r-total{display:flex;justify-content:space-between;font-size:12px;font-weight:900;padding-top:4px;border-top:1px dashed #aaa;margin-top:4px}
  .r-note{font-size:10px;color:#555;margin-top:4px;border-left:2px solid #333;padding-left:4px}
  
  .print-dish-section{display:block!important}
  .pd-shop{text-align:center;font-size:14px;font-weight:900;margin-bottom:2px}
  .pd-date{text-align:center;font-size:10px;color:#555;margin-bottom:6px}
  .pd-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #eee}
  .pd-row:last-child{border-bottom:none}
  .pd-qty{font-weight:900;font-size:13px}
}
.print-receipt,.print-dish-section{display:none}
</style>
</head>
<body>

<!-- PWA Manifest動態注入 -->
<script>

document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);
</script>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <img class="topbar-logo" src="https://www.jinzhu.com.tw/images/Jinzhu_logo.svg" onerror="this.style.display='none'">
    <div>
      <div class="topbar-title">真珠 · 列印</div>
      <div class="topbar-sub">Print Station</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="topbar-badge" id="topbar-date"></span>
  </div>
</div>

<!-- Install Banner -->
<div id="install-banner">
  <div class="install-text">
    加入主畫面，快速開啟
    <small>安裝為 App，使用更方便</small>
  </div>
  <button class="install-btn" id="install-btn">安裝</button>
  <button class="install-dismiss" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>

<!-- Main -->
<div class="main">

  <!-- 篩選卡片 -->
  <div class="card" style="margin-bottom:12px">
    <div class="card-head">
      <span class="card-head-icon">🗓</span>
      <span class="card-head-title">選擇日期</span>
    </div>
    <div class="card-body">
      <div class="date-chips" id="date-chips">
        <button class="chip active" onclick="setChip(this,'today')">今日</button>
        <button class="chip" onclick="setChip(this,'tomorrow')">明日</button>

  <!-- 結果區（查詢後顯示） -->
  <div id="result-area" style="display:none">

    <!-- 檢視切換 -->
    <div class="view-tabs">
      <button class="view-tab active" id="tab-orders" onclick="switchView('orders')">🪑 預約明細</button>
      <button class="view-tab" id="tab-dish" onclick="switchView('dish')">🍳 品項總計</button>
    </div>

    <!-- KPI -->
    <div class="kpi-bar">
      <div class="kpi-card">
        <div class="kpi-val" id="kpi-orders">0</div>
        <div class="kpi-lbl">訂單</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" id="kpi-pax">0</div>
        <div class="kpi-lbl">總人數</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" id="kpi-checked">0</div>
        <div class="kpi-lbl">已勾選</div>
      </div>
    </div>

    <!-- 預約明細 -->
    <div id="view-orders">
      <div class="card">
        <div class="select-all-row">
          <label class="select-all-label" onclick="toggleSelectAll()">
            <div class="order-cb" id="select-all-cb" style="width:18px;height:18px;border-radius:5px">
              <span class="order-cb-tick" id="select-all-tick" style="display:none">✓</span>
            </div>
            <span>全選</span>
          </label>
          <span class="selected-count" id="selected-count-badge">已選 0 筆</span>

              <tr>

  <!-- 空狀態 -->
  <div class="empty" id="empty-state">
    <div class="empty-icon">🖨</div>
    <div class="empty-text">選擇日期後查詢</div>
    <div class="empty-sub">可勾選訂單後一鍵列印</div>
  </div>

</div>

<!-- Bottom Action Bar -->
<div class="bottom-bar">
  <button class="print-btn" id="print-btn" onclick="doPrint()" disabled>
    🖨 列印勾選訂單
  </button>
</div>

<!-- Print Output -->
<div class="print-receipt" id="print-receipt"></div>
<div class="print-dish-section" id="print-dish-section"></div>

<script>
const SB_URL='https://pydlnqriztpzgxbjuohm.supabase.co';
const SB_KEY='sb_publishable_ISKUWOXUR9A-1y81xCOUXg_8-zNle3v';
const _s=supabase.createClient(SB_URL,SB_KEY);

let allOrders=[], checkedIds=new Set(), curView='orders', curPeriod='';

// ── 初始化日期顯示 ──
(function(){
  const now=new Date();
  document.getElementById('topbar-date').textContent=
    `${now.getMonth()+1}/${now.getDate()}`;
  // 預設今日
  setDateRange('today');
})();

// ── 日期快選 ──
function setChip(el, type){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const customDiv=document.getElementById('custom-date');
  if(type==='custom'){
    customDiv.style.display='block';
  } else {
    customDiv.style.display='none';
    setDateRange(type);
  }
}

function setDateRange(type){
  const today=new Date();
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let s,e;
  if(type==='today'){ s=e=fmt(today); }
  else if(type==='tomorrow'){
    const t=new Date(today); t.setDate(t.getDate()+1); s=e=fmt(t);
  } else if(type==='week'){
    const mon=new Date(today);
    mon.setDate(today.getDate()-((today.getDay()+6)%7));
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    s=fmt(mon); e=fmt(sun);
  }
  document.getElementById('date-start').value=s||'';
  document.getElementById('date-end').value=e||'';
}

// ── 查詢 ──
async function doQuery(){
  const ds=document.getElementById('date-start').value;
  const de=document.getElementById('date-end').value;
  if(!ds||!de){ alert('請選擇日期'); return; }

  const btnText=document.getElementById('query-btn-text');
  btnText.textContent='查詢中…';

  // 用訂位日期篩選（台灣+8）
  const {data,error}=await _s.from('orders').select('*')
    .gte('booking_date',`${ds}T00:00:00+08:00`)
    .lte('booking_date',`${de}T23:59:59+08:00`)
    .order('booking_date',{ascending:true});

  btnText.textContent='▶ 查詢訂單';
  if(error){ alert('查詢失敗：'+error.message); return; }

  allOrders=data||[];
  checkedIds=new Set(allOrders.map(o=>o.id)); // 預設全選
  curPeriod=ds===de?ds:`${ds} ～ ${de}`;

  document.getElementById('empty-state').style.display='none';
  document.getElementById('result-area').style.display='block';

  renderOrders();
  renderDish();
  updateKpi();
}

// ── 渲染訂單列表 ──
function renderOrders(){
  const list=document.getElementById('order-list');
  if(!allOrders.length){
    list.innerHTML=`<div class="empty" style="padding:32px"><div class="empty-icon">📋</div><div class="empty-text">此區間無訂單</div></div>`;
    return;
  }

  list.innerHTML=allOrders.map(o=>{
    const checked=checkedIds.has(o.id);
    const tw=o.booking_date?new Date(new Date(o.booking_date).getTime()+8*3600000):null;
    const hhmm=tw?`${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`:'—';
    const pax=[
      o.adult_count?`大${o.adult_count}`:'',
      o.kid_count?`孩${o.kid_count}`:'',
      o.child_count?`兒${o.child_count}`:''
    ].filter(Boolean).join(' ');
    const itemPreview=(o.order_content||[]).map(i=>{
      const qM=i.name.match(/ x(\d+)/),qty=qM?parseInt(qM[1]):1;
      const clean=i.name.split(' (')[0].split(' [')[0].replace(/ x\d+/g,'').trim();
      return `${clean}×${qty}`;
    }).join('、');

    return `<div class="order-item ${checked?'checked':''}" onclick="toggleOrder('${o.id}',this)" data-id="${o.id}">
      <div class="order-cb">
        <span class="order-cb-tick">${checked?'✓':''}</span>
      </div>
      <div class="order-info">
        <div class="order-name-row">
          <span class="order-name">${o.customer_name||'—'}${o.table_no?` · 桌${o.table_no}`:''}</span>
          <span class="order-time">${hhmm}</span>
        </div>
        <div class="order-meta">${o.phone||'—'}${pax?' · '+pax:''}</div>
        <div class="order-items-preview">${itemPreview||'—'}</div>
      </div>
      <div class="order-price">$${o.total_price||0}</div>
    </div>`;
  }).join('');

  updateSelectAllState();
}

// ── 渲染品項總計 ──
function renderDish(){
  const dishCount={}, setCount={};
  allOrders.forEach(o=>{
    (o.order_content||[]).forEach(item=>{
      const qM=item.name.match(/ x(\d+)/),qty=qM?parseInt(qM[1]):1;
      let clean=item.name.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
      const pIdx=clean.indexOf(' ('),inner=pIdx>-1?clean.slice(pIdx+2,-1):null;
      const isSet=inner&&inner.includes('、');
      if(isSet){
        const brand=clean.slice(0,pIdx).trim();
        setCount[brand]=(setCount[brand]||0)+qty;
        inner.split('、').forEach(sub=>{
          const sM=sub.match(/ x(\d+)/),sq=sM?parseInt(sM[1]):1;
          const s=sub.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
          if(s) dishCount[s]=(dishCount[s]||0)+qty*sq;
        });
      } else {
        dishCount[clean]=(dishCount[clean]||0)+qty;
      }
    });
  });

  const sorted=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]);
  const sets=Object.entries(setCount).sort((a,b)=>b[1]-a[1]);
  const maxQ=sorted[0]?.[1]||1;

  let html='';
  if(sets.length){
    sets.forEach(([name,count])=>{
      html+=`<tr>
        <td><span style="font-weight:700">${name}</span><span class="set-badge">套餐</span>
          <div class="dish-bar"><div class="dish-bar-fill" style="width:${Math.round(count/(sorted[0]?.[1]||count)*100)}%"></div></div>
        </td>
        <td class="dish-qty">${count}</td>
      </tr>`;
    });
  }
  sorted.forEach(([name,count])=>{
    html+=`<tr>
      <td>${name}
        <div class="dish-bar"><div class="dish-bar-fill" style="width:${Math.round(count/maxQ*100)}%"></div></div>
      </td>
      <td class="dish-qty">${count}</td>
    </tr>`;
  });

  document.getElementById('dish-body').innerHTML=html||`<tr><td colspan="2" style="text-align:center;padding:24px;color:var(--mist)">無品項資料</td></tr>`;
}

// ── 勾選邏輯 ──
function toggleOrder(id, el){
  if(checkedIds.has(id)) checkedIds.delete(id);
  else checkedIds.add(id);
  el.classList.toggle('checked',checkedIds.has(id));
  el.querySelector('.order-cb-tick').textContent=checkedIds.has(id)?'✓':'';
  updateKpi();
  updateSelectAllState();
}

function toggleSelectAll(){
  if(checkedIds.size===allOrders.length){
    checkedIds.clear();
  } else {
    allOrders.forEach(o=>checkedIds.add(o.id));
  }
  renderOrders();
  updateKpi();
}

function updateSelectAllState(){
  const tick=document.getElementById('select-all-tick');
  const cb=document.getElementById('select-all-cb');
  const all=checkedIds.size===allOrders.length&&allOrders.length>0;
  tick.style.display=all?'block':'none';
  cb.style.background=all?'var(--pine)':'white';
  cb.style.borderColor=all?'var(--pine)':'var(--border)';
}

function updateKpi(){
  const checked=allOrders.filter(o=>checkedIds.has(o.id));
  const totalPax=allOrders.reduce((s,o)=>s+(o.adult_count||0)+(o.kid_count||0)+(o.child_count||0),0);
  document.getElementById('kpi-orders').textContent=allOrders.length;
  document.getElementById('kpi-pax').textContent=totalPax;
  document.getElementById('kpi-checked').textContent=checkedIds.size;
  document.getElementById('selected-count-badge').textContent=`已選 ${checkedIds.size} 筆`;
  document.getElementById('print-btn').disabled=checkedIds.size===0;
}

// ── 切換檢視 ──
function switchView(v){
  curView=v;
  document.getElementById('view-orders').style.display=v==='orders'?'block':'none';
  document.getElementById('view-dish').style.display=v==='dish'?'block':'none';
  document.getElementById('tab-orders').classList.toggle('active',v==='orders');
  document.getElementById('tab-dish').classList.toggle('active',v==='dish');
}

// ── 列印 ──
function doPrint(){
  const toPrint=allOrders.filter(o=>checkedIds.has(o.id));
  if(!toPrint.length){ alert('請先勾選要列印的訂單'); return; }

  const twStr=iso=>{
    if(!iso) return '—';
    const tw=new Date(new Date(iso).getTime()+8*3600000);
    return `${String(tw.getUTCMonth()+1).padStart(2,'0')}/${String(tw.getUTCDate()).padStart(2,'0')} ${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`;
  };

  // 個別訂單
  document.getElementById('print-receipt').innerHTML=toPrint.map(o=>{
    const pax=[
      o.adult_count?`大人${o.adult_count}`:'',
      o.kid_count?`小孩${o.kid_count}`:'',
      o.child_count?`兒童${o.child_count}`:''
    ].filter(Boolean).join('、');

    const items=(o.order_content||[]).map(item=>{
      const qM=item.name.match(/ x(\d+)/),qty=qM?parseInt(qM[1]):1;
      return `<div class="r-item"><span>${item.name}</span><span>×${qty} $${item.price}</span></div>`;
    }).join('');

    return `<div class="receipt-item">
      <div class="r-shop">真珠 文心店</div>
      <div class="r-date">${curPeriod}</div>
      <hr class="r-divider">
      <div class="r-name">${o.customer_name||'—'}${o.table_no?` · 桌${o.table_no}`:''}</div>
      <div class="r-meta">${o.phone||'—'}${pax?' · '+pax:''}</div>
      <div class="r-time">訂位：${twStr(o.booking_date)}</div>
      <hr class="r-divider">
      ${items}
      ${o.note?`<div class="r-note">備註：${o.note}</div>`:''}
      <div class="r-total"><span>合計</span><span>$${o.total_price||0}</span></div>
    </div>`;
  }).join('');

  window.print();
}

// ── PWA Install ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt=null;
      document.getElementById('install-banner').classList.remove('show');
    });
  }
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
</script>
